<!doctype html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>· Smart Assignment Portal</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
  </div>

  <main class="container admin-container">
    <header class="glass admin-hero">
      <div>
        <p class="hero-eyebrow">⚙️ ADMIN PANEL</p>
        <h1 class="hero-title"><span class="aurora">Assignment</span> Manager</h1>
        <p class="hero-status bn </p>
      </div>
      <a href="index.html" class="btn ghost" style="flex:0 0 auto;">← মূল পেজ</a>
    </header>

    <!-- LOGIN GATE -->
    <section class="glass" id="loginCard">
      <h3 style="margin-bottom:14px;"></h3>
      <form id="loginForm" class="add-form" style="margin-bottom:0;">
        <input id="pwInput" type="password" placeholder="পাসওয়ার্ড লিখুন" autocomplete="current-password" required />
        <div class="form-row">
          <button type="submit" class="btn primary">প্রবেশ করুন</button>
        </div>
        <p id="pwError" class="bn" style="color:hsl(0 84% 70%);font-size:13px;display:none;">ভুল পাসওয়ার্ড- তোমার জন্য এইটা না </p>
      </form>
      <p class="bn" style="color:var(--muted);font-size:12px;margin-top:14px;">
        
      </p>
    </section>

    <!-- ADMIN PANEL -->
    <section id="adminPanel" hidden>
      <!-- Add form -->
      <article class="glass" style="margin-bottom:24px;">
        <h3 style="margin-bottom:14px;">➕ নতুন অ্যাসাইনমেন্ট যোগ করুন</h3>
        <form id="addForm" class="add-form" style="margin-bottom:0;">
          <input id="aTitle" placeholder="শিরোনাম (যেমন: ল্যাব রিপোর্ট)" required />
          <input id="aSubject" placeholder="বিষয় (যেমন: রসায়ন-২)" required />
          <input id="aDue" type="date" required />
          <div class="form-row">
            <button type="submit" class="btn primary">যোগ করুন</button>
            <button type="button" class="btn ghost" id="resetForm">রিসেট</button>
          </div>
        </form>
      </article>

      <!-- List -->
      <article class="glass" style="margin-bottom:24px;">
        <div class="assign-head">
          <h3> (<span id="count">0</span>)</h3>
          <button class="btn ghost" id="loadBtn" style="flex:0 0 auto;"></button>
        </div>
        <ul id="adminList" class="assign-list"></ul>
      </article>

      <!-- Export -->
      <article class="glass">
        <div class="assign-head">
          <h3></h3>
          <button class="btn primary" id="copyBtn" style="flex:0 0 auto;"></button>
        </div>
        <p class="bn" style="color:var(--muted);font-size:13px;margin-bottom:12px;">
          
        </p>
        <textarea id="jsonOutput" class="json-output mono" readonly></textarea>
        <p id="copyStatus" class="bn" style="color:var(--success);font-size:13px;margin-top:10px;display:none;">✓</p>
      </article>
    </section>

    <footer class="foot"></footer>
  </main>

  <script src="admin.js" defer></script>
</body>
                                                                                              </html>
